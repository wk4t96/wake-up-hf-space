name: Wake Up Hugging Face Space

on:
  schedule:
    # 每天 00:00 UTC 運行一次
    - cron: '0 0 * * *'  
  workflow_dispatch:  # 允許手動觸發

jobs:
  wake-up:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 賦予寫入權限以執行 git push
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Wake Up Space
        run: |
          # 使用 -L 追蹤重定向，確保觸發背後的容器
          curl -fL "https://huggingface.co/spaces/wk4t96/PCB-defect-prediction-yolov8s" || echo "Space is waking up or busy"

      - name: Prevent GitHub Action Hibernation
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit --allow-empty -m "Scheduled keep-alive: $(date)"
          git push
